<!DOCTYPE html>
<html style="scroll-behavior: smooth;">
<head>

    <link rel="icon" type="image/png" href="{{ url_for('static', filename='assets/pipInstruct.png') }}">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" type="text/css" href="{{ url_for('static', filename='grid.css') }}">
    <link rel="stylesheet" type="text/css" href="{{ url_for('static', filename='homepage.css') }}">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        /* Global default font stack for the site */
        html, body {
            font-family: 'Gill Sans', 'Gill Sans MT', Calibri, sans-serif;

    </style>

<body>

    {% include 'components/grid_background.html' %}

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/particles.js@2.0.0/particles.min.js"></script>
