<!DOCTYPE html>
<html style="scroll-behavior: smooth;">
<head>
    <title>Animatic</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" type="text/css" href="{{ url_for('static', filename='homepage.css') }}">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
</head>

<body>
    <nav class="navbar navbar-expand-lg fixed-top shadow-sm" style="background-color: #00325a;">
        <div class="container">
            <a class="navbar-brand fw-bold text-white fst-italic" href="/" style="font-family: 'Gill Sans', 'Gill Sans MT', Calibri; font-size: 1.8rem; letter-spacing: 1px;">
                ANIMATIC
            </a>
            <button class="navbar-toggler border-white" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon" style="filter: invert(1);"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto fs-5" style="font-family: 'Gill Sans', 'Gill Sans MT', Calibri;">
                    <li class="nav-item"><a class="nav-link text-white px-3" href="/learn">LEARN</a></li>
                    <li class="nav-item"><a class="nav-link text-white px-3" href="/quiz">QUIZ</a></li>
                    <li class="nav-item"><a class="nav-link text-white px-3" href="/about">ABOUT</a></li>
                </ul>
            </div>
        </div>
    </nav>

    <div class="canvas">
        <canvas id="arcade-canvas" class="pixelCon"></canvas>
    </div>

    {% block content %}
    {% endblock %}

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script src="{{ url_for('static', filename='background.js') }}"></script>
    <script src="{{ url_for('static', filename='homepage.js') }}"></script>
</body>
</html>
