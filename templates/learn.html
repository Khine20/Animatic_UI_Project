<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Animator Workspace</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Comfortaa:wght@400;500;600;700&family=Fugaz+One&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='animator/animator.css') }}">
    <style>
        body {
            background: #00325a;
            margin: 0;
            width: 100%;
            height: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            text-align: center;
            overflow: hidden;
            font-family: Calibri, sans-serif;
        }

        .workspace-page {
            min-height: 100vh;
            padding: 4rem 2rem;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        .workspace-layout {
            display: flex;
            flex-direction: row;
            gap: 3rem;
            width: 100%;
            max-width: 1200px;
            align-items: center;
            justify-content: center;
        }

        .pip-panel {
            border: none;
            background: transparent;
            padding: 100px 1rem 1rem;
            width: 345px;
            color: black;
            display: flex;
            flex-direction: column;
            gap: 1.5rem;
        }

        .pip-image {
            width: 250px;
            height: auto;
            position: absolute;
            bottom: calc(100% - 10px);
            left: 50%;
            transform: translateX(-50%);
            z-index: 2;
        }

        .pip-dialogue-container {
            position: relative;
            display: flex;
            justify-content: center;
        }

        .pip-dialogue {
            font-family: 'Comfortaa', cursive;
            font-size: 16px;
            line-height: 1.5;
            min-height: 80px;
            position: relative;
            background: white;
            border: 2px solid #00942f;
            border-radius: 8px;
            padding: 1rem;
            width: 100%;
            max-width: 325px;
        }

        .pip-dialogue::before {
            content: '';
            position: absolute;
            top: -10px;
            left: 50%;
            transform: translateX(-50%);
            width: 0;
            height: 0;
            border-left: 10px solid transparent;
            border-right: 10px solid transparent;
            border-bottom: 10px solid #00942f;
        }

        .pip-dialogue::after {
            content: '';
            position: absolute;
            top: -8px;
            left: 50%;
            transform: translateX(-50%);
            width: 0;
            height: 0;
            border-left: 8px solid transparent;
            border-right: 8px solid transparent;
            border-bottom: 8px solid white;
        }

        .pip-hint {
            font-size: 14px;
            line-height: 1.4;
            color: #fff;
            min-height: 48px;
            margin-top: 0.75rem;
            max-width: 300px;
        }

        .hint-row {
            width: 100%;
            max-width: 1200px;
            display: flex;
            justify-content: flex-start;
            padding-top: 1rem;
            margin-left: 2rem;
        }

        .pip-btn {
            background-color:#333333;
            color: #fff;
            border: 1px solid #555;
            padding: 8px 16px;
            font-family: inherit;
            align-self: flex-start;
            cursor: pointer;
            transition: 0.2s ease;
        }

        .pip-btn:hover {
            background-color: #00942f;
            border-color: #00942f;
        }

        .mission-panel {
            background: white;
            border: 2px solid #00942f;
            border-radius: 8px;
            padding: 2rem;
            width: 300px;
            color: black;
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }

        .mission-name {
            font-size: 20px;
            font-weight: bold;
            color: #00942f;
            margin: 0;
        }

        .mission-text {
            font-size: 16px;
            line-height: 1.5;
            min-height: 120px;
        }

        /* Quiz button slot inside the mission panel */
        .mission-quiz-slot {
            display: none;
            margin-top: 0.5rem;
            padding-top: 1rem;
            border-top: 1px dashed #c8e6c9;
            flex-direction: column;
            gap: 0.5rem;
            align-items: stretch;
        }
        .mission-quiz-slot.visible { display: flex; }
        .mission-quiz-slot .mission-quiz-label {
            font-size: 13px;
            color: #00942f;
            font-weight: bold;
            text-align: center;
            letter-spacing: 1px;
            text-transform: uppercase;
        }
        .mission-quiz-slot .quiz-link-btn {
            width: 100%;
            text-align: center;
            box-shadow: 0 4px 12px rgba(0,148,47,0.35);
        }
        .mission-quiz-slot .quiz-link-btn:hover {
            transform: translateY(-1px);
            box-shadow: 0 6px 16px rgba(0,148,47,0.45);
        }

        .workspace-stage {
            width: 100%;
            max-width: 800px;
            margin: 0 auto;
            display: flex;
            flex-direction: column;
            align-items: center;
            border: none;
            padding: 0;
        }

        .animator-module {
            width: 100%;
            max-width: 800px;
            min-width: 320px;
            margin: 0 auto;
        }

        .learn-actions {
            width: 100%;
            max-width: 800px;
            margin: 1.5rem auto 0;
            display: none;
            justify-content: flex-end;
        }

        .quiz-link-btn {
            background-color: #00942f;
            color: #fff;
            border: none;
            padding: 10px 22px;
            font-family: 'Courier New', Courier, monospace;
            font-size: 16px;
            letter-spacing: 1px;
            text-decoration: none;
            cursor: pointer;
            transition: 0.3s ease;
        }

        .quiz-link-btn:hover {
            background-color: #007424;
            color: #fff;
        }
    </style>
</head>
<body>
    <nav class="navbar navbar-expand-lg fixed-top shadow-sm" style="background-color: #00325a;">
        <div class="container">
            <a class="navbar-brand fw-bold text-white fst-italic" href="/" style="font-family: 'Fugaz One', sans-serif; font-size: 1.8rem; letter-spacing: 1px;">
                ANIMATIC
            </a>
        </div>
    </nav>
    <main class="workspace-page">
        <div class="workspace-layout">
            <aside class="pip-panel">
                <div class="pip-dialogue-container">
                    <img src="{{ url_for('static', filename='assets/pipInstruct.png') }}" alt="Pip" class="pip-image">
                    <div class="pip-dialogue" id="pip-text">
                        Hi, I’m Pip! I’ll be your guide as you create your first animation.
                    </div>
                </div>
                <div style="display: flex; gap: 0.5rem;">
                    <button class="pip-btn" id="pip-prev-btn" style="display: none;">⬅️</button>
                    <button class="pip-btn" id="pip-next-btn">➡️</button>
                </div>
            </aside>
            <div class="workspace-stage" id="workspace-stage">
                {% set animator_id = 'lesson-base' %}
                {% set file_name = 'lesson-1.ani' %}
                {% set fps = 12 %}
                {% set max_frames = 30 %}
                {% include 'components/animator_canvas.html' %}
            </div>
            <aside class="mission-panel">
                <h2 class="mission-name" id="mission-name">Mission</h2>
                <div class="mission-text" id="mission-text"></div>

                <div class="mission-quiz-slot" id="mission-quiz-slot">
                    <span class="mission-quiz-label">Ready?</span>
                    <button class="quiz-link-btn" id="quiz-btn">Take the Quiz &rarr;</button>
                </div>
            </aside>

        </div>

        <div class="hint-row">
            <div class="pip-hint" id="pip-hint"></div>
        </div>
    </main>

    <script src="{{ url_for('static', filename='animator/animator.js') }}"></script>

    <script>
        window.addEventListener('DOMContentLoaded', function () {
            function saveFrames(frames) {
                return fetch('/save_frames', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ frames: frames })
                });
            }

            const api = window.AnimaticCanvasModule.mount('#animator-root-lesson-base', {
                draggable: false,
                onChange: function (frames) {
                    saveFrames(frames);
                }
            });

            // Restore previously saved frames from server (in-memory, lost on restart)
            fetch('/load_frames')
                .then(r => r.json())
                .then(data => {
                    if (data.frames && data.frames.length > 0) {
                        api.loadFrames(data.frames);
                    }
                });
            const pipText = document.getElementById('pip-text');
            const pipHint = document.getElementById('pip-hint');
            const missionText = document.getElementById('mission-text');
            const missionName = document.getElementById('mission-name');
            const pipNextBtn = document.getElementById('pip-next-btn');
            const pipPrevBtn = document.getElementById('pip-prev-btn');
            const missionQuizSlot = document.getElementById('mission-quiz-slot');

            const dialogues = [
                "Hi, I’m Pip! I’ll be your guide as you create your first animation.",
                "At the end of this tutorial, you will have something like this:",
                "Let's learn about the tools first! Hover over each tool to see what it does. Click next when you’re ready to start drawing!",
                "I’ve already placed the “ground” for you! First, draw a circle. Think about where you’d want to draw the circle.",
                "Great! Now click the onion skin tool. The onion tool allows you to keep track of your previous and future frames.",
                "Create a new frame.",
                "Now you’re ready! Keep drawing the ball as it moves closer to the ground. Do this until the ball hits the ground!",
                "You’ve got the hang of it! Do the exact same thing, but this time with the ball bouncing back up. Stop when the ball is as high as the first frame. Can you guess why?",
                "Hit the 'Play' button to see your animation in action!",
                "Congratulations, you just created your first animation! Play your animation and it’ll run through your frames quickly."
            ];

            const hints = {
                2: "Hint: Where would the ball start if you were dropped it?",
                9: "Hint: You’ll need to add more frames each time you move the ball."
            };

            const mission = [
                "Click next.",
                "Click next.",
                "Explore the tools.",
                "Draw a ball. Consider the placement. Click next when finished.",
                "Click the onion skin tool.",
                "Create a new frame.",
                "Create more frames as you draw the ball moving downward. Click next when you’re finished.",
                "Create more frames as you draw the ball moving upward. Click next when you’re finished.",
                "Click play. Click next when you’re ready for the quiz!"
            ];

            const toolInfo = {
                "pen": { title: "Pen", text: "Draw your animation on the canvas frame by frame with this tool.<br><br>Traditional animators used to draw entirely with pencils on paper before tracing the final lines in ink!" },
                "eraser": { title: "Eraser", text: "Remove any mistakes or refine your drawing by erasing unwanted lines.<br><br>The first erasers used by early artists were actually made of rolled-up crustless bread before rubber was discovered!" },
                "clear": { title: "Clear Canvas", text: "Instantly wipe your entire frame clean so you can start completely fresh.<br><br>In early animation, cleaning a cel meant literally washing the paint off so the expensive celluloid sheets could be reused." },
                "toggle-onion": { title: "Onion Skin", text: "See a faded version of your previous frames to help you perfectly line up your next drawing.<br><br>It's called \"onion skinning\" because animators originally used thin, translucent paper that resembled the skin of an onion!" },
                "add-frame": { title: "Add Frame", text: "Create a brand new blank frame to continue your animation sequence.<br><br>A typical feature-length animated film requires drawing over 100,000 individual frames!" },
                "toggle-play": { title: "Play / Stop", text: "Watch your individual drawings come to life in a continuous looping movie.<br><br>The illusion of movement is caused by \"persistence of vision,\" a trick where your brain magically blends rapid individual images together." },
                "delete-frame": { title: "Delete Frame", text: "Remove the current frame from your animation timeline." }
            };

            let step = 0;
            let currentToolKey = null; // Track the currently hovered tool identifier
            const defaultStep2Mission = mission[2]; // Store the default step 2 mission text
            const defaultMissionName = 'Mission'; // Store the default mission title

            const updatePip = function () {
                pipText.textContent = dialogues[step];
                pipHint.textContent = hints[step] || '';
                
                // Enable floor line from step 3 onwards
                if (api && typeof api.setFloor === 'function') {
                    if (step >= 3) {
                        api.setFloor(true);
                    } else {
                        api.setFloor(false);
                    }
                }
                
                // For step 2, use the currently hovered tooltip if available, otherwise use default
                if (step === 2) {
                    if (currentToolKey && toolInfo[currentToolKey]) {
                        missionName.textContent = toolInfo[currentToolKey].title;
                        missionText.innerHTML = toolInfo[currentToolKey].text;
                    } else {
                        missionText.innerHTML = defaultStep2Mission;
                        missionName.textContent = defaultMissionName;
                    }
                } else {
                    missionText.innerHTML = mission[step] || '';
                    missionName.textContent = defaultMissionName;
                    currentToolKey = null; // Clear tool tracking when leaving step 2
                }
            };


            pipNextBtn.addEventListener('click', function () {
                if (step < dialogues.length - 1) {
                    step++;
                    updatePip();
                }
                if (step === dialogues.length - 1) {
                    missionQuizSlot.classList.add('visible');
                    pipNextBtn.style.display = 'none';
                }
                pipPrevBtn.style.display = step > 0 ? 'inline-block' : 'none';
            });

            pipPrevBtn.addEventListener('click', function () {
                if (step > 0) {
                    step--;
                    updatePip();
                    pipNextBtn.style.display = 'inline-block';
                    missionQuizSlot.classList.remove('visible');
                }
                pipPrevBtn.style.display = step > 0 ? 'inline-block' : 'none';
            });


            updatePip();
            pipPrevBtn.style.display = step > 0 ? 'inline-block' : 'none';

            // Step 2 tool tooltip integration: show tool descriptions in mission panel
            const animatorRoot = document.querySelector('#animator-root-lesson-base');
            
            if (animatorRoot) {
                animatorRoot.addEventListener('mouseover', function (e) {
                    if (step !== 2) return;
                    const button = e.target.closest('[data-tooltip]');
                    if (button) {
                        let toolKey = button.dataset.tool || button.dataset.action;
                        if (button.classList.contains('animator-thumb-add')) {
                            toolKey = "add-frame";
                        }
                        
                        if (toolKey && toolInfo[toolKey]) {
                            currentToolKey = toolKey;
                            updatePip();
                        }
                    }
                });
                
                animatorRoot.addEventListener('mouseout', function (e) {
                    if (step !== 2) return;
                    const button = e.target.closest('[data-tooltip]');
                    if (button) {
                        currentToolKey = null;
                        updatePip();
                    }
                });
            }

            document.getElementById('quiz-btn').addEventListener('click', function() {
                const frames = api.getFrames();
                console.log('[learn] sending', frames.length, 'frames to /save_frames');
                fetch('/save_frames', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ frames: frames })
                }).then(r => r.json()).then(data => {
                    if (data && data.ok) {
                        window.location.href = '/quiz/1';
                    } else {
                        console.error('[learn] /save_frames failed', data);
                        window.location.href = '/quiz/1';
                    }
                }).catch(function (err) {
                    console.error('[learn] /save_frames error', err);
                    window.location.href = '/quiz/1';
                });
            });
        });
    </script>
</body>
</html>
