{% extends "base.html" %}

{% block content %}
    <style>
        /* Override homepage.css to allow scrolling when the About section is visible */
        html, body {
            display: block !important;
            height: auto !important;
            overflow: auto !important;
        }
    </style>
    <div class="container d-flex align-items-center min-vh-100" style="position: relative; z-index: 10; padding-top: 56px;">
        
        <div class="row align-items-center w-100 p-3 p-md-4">
            
            <div class="col-md-5 text-center mb-4 mb-md-0">
                <img src="{{ url_for('static', filename='pip.png') }}" alt="Pip Guide" class="img-fluid" style="max-width: 350px;">
            </div>
            
            <div class="col-md-7 text-center text-md-start" style="color: #ffffff; font-family: 'Gill Sans', 'Gill Sans MT', Calibri;">
                <h1 class="fw-bold mb-4" style="font-size: 3rem;">How To Make Animation</h1>
                <p class="lead mb-4 fs-4" style="line-height: 1.6;">
                    With Pip as your guide, you'll learn drawing techniques, frame-by-frame animation, and bring your creative ideas to life!
                </p>
                <button id="start-button" class="btn btn-lg px-4 py-2 mt-2" style="border: 1px solid #ffffff; color: #ffffff; background-color: #3d82ffff; border-radius: 0;">
                    Start Animating
                </button>
            </div>
        </div>
    </div>

{% endblock %}
