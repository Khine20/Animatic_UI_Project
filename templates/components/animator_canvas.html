<section id="animator-root-{{ animator_id|default('main') }}" class="animator-module" data-fps="{{ fps|default(12) }}" data-max-frames="{{ max_frames|default(30) }}">
    <div class="animator-window" data-animator-window>
        <div class="animator-titlebar">
            <span class="animator-title">Mini Animator - {{ file_name|default('untitled.ani') }}</span>
            <div class="animator-window-buttons" aria-hidden="true">
                <span class="animator-window-button"></span>
                <span class="animator-window-button"></span>
                <span class="animator-window-button"></span>
            </div>
        </div>

        <div class="animator-workspace">
            <aside class="animator-tools" aria-label="Drawing tools">
                <div class="animator-tools-main">
                    <button type="button" class="animator-btn is-active" data-action="set-tool" data-tool="pen" data-tooltip="Pencil: draw on the current frame.">🖊️</button>
                    <button type="button" class="animator-btn" data-action="set-tool" data-tool="eraser" data-tooltip="Eraser: remove parts of your drawing.">🧹</button>
                </div>
                <div class="animator-tools-onion" aria-label="Effects">
                    <button type="button" class="animator-btn" data-action="toggle-onion" data-tooltip="Onion Skin: preview nearby frames as ghosts.">🧅</button>
                </div>
                <div class="animator-tools-utility" aria-label="Canvas actions">
                    <button type="button" class="animator-btn animator-btn-clear" data-action="clear" data-tooltip="Clear: erase everything on this frame.">CLR</button>
                    <button type="button" class="animator-btn animator-btn-del" data-action="delete-frame" data-tooltip="Delete this frame (disabled if only 1 frame)">DEL</button>
                </div>
            </aside>

            <div class="animator-canvas-stage">
                <canvas class="animator-canvas animator-canvas-onion" data-role="canvas-onion"></canvas>
                <canvas class="animator-canvas animator-canvas-main" data-role="canvas-main"></canvas>
            </div>
        </div>

        <div class="animator-timeline-shell">
            <div class="animator-controls">
                <button type="button" class="animator-btn" data-action="toggle-play" data-tooltip="Play/Stop: preview your animation.">
                    <span data-role="play-icon"></span>
                    <span data-role="play-text">Play ({{ fps|default(12) }}fps)</span>
                </button>
            </div>

            <div class="animator-frames">
                <input type="range" min="1" max="1" value="1" data-role="frame-slider" aria-label="Frame slider">
                <div class="animator-timeline" data-role="timeline" aria-label="Timeline"></div>
            </div>
        </div>

        <div class="animator-statusbar">
            <span>Ready</span>
            <span data-role="status-coords">0, 0</span>
        </div>
    </div>
</section>
