<section id="animator-root-{{ animator_id|default('main') }}" class="animator-module" data-fps="{{ fps|default(12) }}" data-max-frames="{{ max_frames|default(30) }}">
    <div class="animator-window" data-animator-window>
        <div class="animator-workspace">
            <aside class="animator-tools" aria-label="Drawing tools">
                <div class="animator-tools-container">
                    <button type="button" class="animator-btn is-active" data-action="set-tool" data-tool="pen" data-tooltip="Pencil">
                        <img class="animator-icon" src="{{ url_for('static', filename='assets/pen.png') }}" alt="Pen">
                    </button>
                    <button type="button" class="animator-btn" data-action="set-tool" data-tool="eraser" data-tooltip="Eraser">
                        <img class="animator-icon" src="{{ url_for('static', filename='assets/erase.png') }}" alt="Eraser">
                    </button>
                    <button type="button" class="animator-btn" data-action="toggle-onion" data-tooltip="Onion Skin">
                        <img class="animator-icon" src="{{ url_for('static', filename='assets/onion.png') }}" alt="Onion skin">
                    </button>
                    <button type="button" class="animator-btn animator-btn-clear" data-action="clear" data-tooltip="Clear Frame">
                        <img class="animator-icon" src="{{ url_for('static', filename='assets/delete.png') }}" alt="Clear frame">
                    </button>
                    <button type="button" class="animator-btn animator-btn-del" data-action="delete-frame" data-tooltip="Delete this frame (disabled if only 1 frame)">
                        <img class="animator-icon" src="{{ url_for('static', filename='assets/trash.png') }}" alt="Delete frame">
                    </button>
                    <button type="button" class="animator-btn animator-btn-play" data-action="toggle-play" data-tooltip="Play/Stop">
                        <img class="animator-icon" data-role="play-icon" src="{{ url_for('static', filename='assets/play.png') }}" alt="Play">
                    </button>
                </div>
            </aside>

            <div class="animator-canvas-stage">
                <canvas class="animator-canvas animator-canvas-onion" data-role="canvas-onion"></canvas>
                <canvas class="animator-canvas animator-canvas-main" data-role="canvas-main"></canvas>
            </div>
        </div>

        <div class="animator-timeline-shell">
            <div class="animator-frames">
                <div class="animator-timeline" data-role="timeline" aria-label="Timeline"></div>
            </div>
        </div>
    </div>
</section>
